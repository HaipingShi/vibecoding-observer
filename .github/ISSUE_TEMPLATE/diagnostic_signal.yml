name: Diagnostic signal issue
description: Report a false positive, false negative, confusing label, or weak diagnosis.
title: "[Signal]: "
labels: ["area:taxonomy", "needs:repro"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for label quality problems such as false positives, false negatives, confusing evidence, or report wording that does not match the session. Keep examples redacted.
  - type: dropdown
    id: signal_type
    attributes:
      label: Signal issue type
      options:
        - False positive
        - False negative
        - Confusing user-facing explanation
        - Weak or misleading diagnosis
        - Consulting route mismatch
        - Not sure
    validations:
      required: true
  - type: input
    id: label_or_section
    attributes:
      label: Label, section, or route
      description: Name the label, report section, diagnosis, or consulting route if you know it.
      placeholder: "weak_goal, eng-verify, Section VII, frontend-start-before-code"
  - type: textarea
    id: redacted_evidence
    attributes:
      label: Redacted evidence
      description: Paste a small redacted excerpt, label count, or report snippet. Do not paste private logs.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected_reading
    attributes:
      label: Expected interpretation
      description: What should the tool have inferred or avoided inferring?
    validations:
      required: true
  - type: textarea
    id: why_it_matters
    attributes:
      label: Why this matters
      description: How does this affect the usefulness of the diagnostic report or consulting route?
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I redacted private project names, local paths, secrets, and personal data.
          required: true
